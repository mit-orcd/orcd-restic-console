<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>ORCD Backups</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
  </head>
  <body>
    <header>
      <div class="header-row">
        <div class="header-brand">
          <img src="{{ url_for('static', filename='images/orcd-x.png') }}" alt="" class="header-logo" width="40" height="40">
          <div>
            <h1>ORCD Backups</h1>
            <p class="header-tagline">Control Panel</p>
          </div>
        </div>
        <nav class="header-nav">
          <button type="button" class="theme-toggle" id="theme-toggle" title="Toggle light/dark panel" aria-label="Toggle light/dark theme">
            <svg class="theme-toggle-icon" width="22" height="22" viewBox="0 0 22 22" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
              <circle cx="11" cy="11" r="10" stroke="currentColor" stroke-width="1.2" fill="none"/>
              <path d="M11 1 A10 10 0 0 1 11 21" class="theme-toggle-half theme-toggle-half-light"/>
              <path d="M11 21 A10 10 0 0 1 11 1" class="theme-toggle-half theme-toggle-half-dark"/>
            </svg>
          </button>
          {% if current_user %}
            <span class="header-user">{{ current_user }}</span>
            {% if is_admin %}
              <a href="{{ url_for('maintenance') }}" class="header-link">Maintenance</a>
            {% endif %}
            <a href="{{ url_for('logout') }}" class="header-link">Logout</a>
          {% endif %}
        </nav>
      </div>
    </header>
    <main>
      {% block content %}{% endblock %}
    </main>
    <footer class="site-footer">
      <p class="footer-tagline">Manage restic backups, restore jobs, and destinations.</p>
    </footer>
    <script src="{{ url_for('static', filename='app.js') }}"></script>
  </body>
</html>
